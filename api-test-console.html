<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylon Mango - API Test Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #764ba2;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 14px;
        }

        .status-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .status-item {
            padding: 15px;
            border-radius: 8px;
            background: #f5f5f5;
            border-left: 4px solid #ddd;
        }

        .status-item.connected { border-left-color: #10b981; }
        .status-item.disconnected { border-left-color: #ef4444; }

        .status-item strong {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .test-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .test-section:last-child {
            border-bottom: none;
        }

        .test-button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 8px;
            transition: background 0.3s;
            font-size: 14px;
        }

        .test-button:hover {
            background: #764ba2;
        }

        .test-button.secondary {
            background: #6b7280;
        }

        .test-button.secondary:hover {
            background: #4b5563;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }

        .response-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .response-success {
            background: #ecfdf5;
            border-color: #10b981;
        }

        .response-error {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .result-item {
            padding: 12px;
            background: white;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .result-item.pass {
            border-left-color: #10b981;
            background: #f0fdf4;
        }

        .result-item.fail {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .result-status {
            font-size: 12px;
            color: #666;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .summary-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥭 Ceylon Mango - API Test Console</h1>
            <p>Interactive testing interface for Ceylon Mango e-commerce API</p>
            
            <div class="status-box">
                <div class="status-item" id="backendStatus">
                    <strong>Backend Status</strong>
                    <div class="status-value" id="backendIndicator">Checking...</div>
                </div>
                <div class="status-item" id="authStatus">
                    <strong>Authentication</strong>
                    <div class="status-value" id="authIndicator">Not logged in</div>
                </div>
                <div class="status-item">
                    <strong>Base URL</strong>
                    <div class="status-value">http://localhost:8080</div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside>
                <div class="panel">
                    <h2>🔐 Authentication</h2>
                    
                    <div class="test-section">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" value="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" value="password123">
                        </div>
                        <button class="test-button" onclick="testLogin()">
                            🔓 Customer Login
                        </button>
                    </div>

                    <div class="test-section">
                        <div class="form-group">
                            <label>Admin Email</label>
                            <input type="email" id="adminEmail" value="admin@ceylonmango.lk">
                        </div>
                        <div class="form-group">
                            <label>Admin Password</label>
                            <input type="password" id="adminPassword" value="admin123">
                        </div>
                        <button class="test-button" onclick="testAdminLogin()">
                            🔐 Admin Login
                        </button>
                    </div>

                    <div class="test-section">
                        <h3 style="font-size: 14px; margin-bottom: 10px;">Quick Tests</h3>
                        <button class="test-button secondary" onclick="runQuickTests()">
                            ⚡ Run All Tests
                        </button>
                        <button class="test-button secondary" onclick="testBackendConnection()">
                            🔗 Test Connection
                        </button>
                        <button class="test-button secondary" onclick="clearResults()">
                            🗑️  Clear Results
                        </button>
                    </div>
                </div>
            </aside>

            <main>
                <div class="panel">
                    <h2>📊 Test Results</h2>
                    <div id="resultsContainer" style="min-height: 300px;">
                        <p style="color: #999;">Results will appear here...</p>
                    </div>

                    <div class="summary" id="summary" style="display: none;">
                        <div class="summary-item">
                            <div class="summary-number" id="totalTests">0</div>
                            <div class="summary-label">Total Tests</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number" style="color: #10b981;" id="passedTests">0</div>
                            <div class="summary-label">Passed ✅</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-number" style="color: #ef4444;" id="failedTests">0</div>
                            <div class="summary-label">Failed ❌</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8080/api';
        let testResults = [];
        let customerToken = null;
        let adminToken = null;

        // Add test result
        function addResult(title, status, details = '') {
            testResults.push({ title, status, details });
            displayResults();
        }

        // Display results
        function displayResults() {
            const container = document.getElementById('resultsContainer');
            const summary = document.getElementById('summary');

            if (testResults.length === 0) {
                container.innerHTML = '<p style="color: #999;">Results will appear here...</p>';
                summary.style.display = 'none';
                return;
            }

            let html = '';
            let passed = 0, failed = 0;

            testResults.forEach(result => {
                passed += result.status === 'pass' ? 1 : 0;
                failed += result.status === 'fail' ? 1 : 0;

                const icon = result.status === 'pass' ? '✅' : '❌';
                const className = result.status === 'pass' ? 'pass' : 'fail';

                html += `
                    <div class="result-item ${className}">
                        <div class="result-title">${icon} ${result.title}</div>
                        <div class="result-status">${result.details}</div>
                    </div>
                `;
            });

            container.innerHTML = html;

            document.getElementById('totalTests').textContent = testResults.length;
            document.getElementById('passedTests').textContent = passed;
            document.getElementById('failedTests').textContent = failed;
            summary.style.display = 'grid';
        }

        // Clear results
        function clearResults() {
            testResults = [];
            displayResults();
        }

        // API call wrapper
        async function apiCall(method, endpoint, data = null, token = null) {
            try {
                const config = {
                    method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                if (token) {
                    config.headers['Authorization'] = `Bearer ${token}`;
                }

                if (data) {
                    config.body = JSON.stringify(data);
                }

                const response = await fetch(BASE_URL + endpoint, config);
                const responseData = await response.json();
                return { status: response.status, data: responseData };
            } catch (error) {
                return { status: 0, error: error.message };
            }
        }

        // Test backend connection
        async function testBackendConnection() {
            clearResults();
            const response = await apiCall('GET', '/products');
            
            if (response.status === 200) {
                document.getElementById('backendStatus').className = 'status-item connected';
                document.getElementById('backendIndicator').textContent = '✅ Connected';
                addResult('Backend Connection', 'pass', 'Successfully connected to backend API');
            } else {
                document.getElementById('backendStatus').className = 'status-item disconnected';
                document.getElementById('backendIndicator').textContent = '❌ Offline';
                addResult('Backend Connection', 'fail', `Status: ${response.status} - Backend may not be running`);
            }
        }

        // Test login
        async function testLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            const response = await apiCall('POST', '/auth/login', { email, password });

            if (response.status === 200 && response.data.token) {
                customerToken = response.data.token;
                document.getElementById('authStatus').className = 'status-item connected';
                document.getElementById('authIndicator').textContent = '✅ Logged In';
                addResult('Customer Login', 'pass', `Logged in as ${email}`);
            } else {
                addResult('Customer Login', 'fail', `Failed: ${response.status} - ${response.data?.message || 'Invalid credentials'}`);
            }
        }

        // Test admin login
        async function testAdminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            const response = await apiCall('POST', '/auth/admin/login', { email, password });

            if (response.status === 200 && response.data.token) {
                adminToken = response.data.token;
                addResult('Admin Login', 'pass', `Admin access granted for ${email}`);
            } else {
                addResult('Admin Login', 'fail', `Failed: ${response.status}`);
            }
        }

        // Run all quick tests
        async function runQuickTests() {
            clearResults();
            
            // 1. Test connection
            let response = await apiCall('GET', '/products');
            if (response.status === 200) {
                addResult('Backend Connection', 'pass', 'API is responding');
            } else {
                addResult('Backend Connection', 'fail', 'Backend is not responding');
                return;
            }

            // 2. Get products
            response = await apiCall('GET', '/products');
            if (response.status === 200) {
                addResult('Get Products', 'pass', `Retrieved ${response.data.length || 0} products`);
            } else {
                addResult('Get Products', 'fail', `Status: ${response.status}`);
            }

            // 3. Get featured
            response = await apiCall('GET', '/products/featured');
            if (response.status === 200) {
                addResult('Featured Products', 'pass', `Retrieved ${response.data.length || 0} featured products`);
            } else {
                addResult('Featured Products', 'fail', `Status: ${response.status}`);
            }

            // 4. Test invalid login
            response = await apiCall('POST', '/auth/login', { 
                email: 'invalid@test.com', 
                password: 'wrongpassword' 
            });
            if (response.status === 401) {
                addResult('Invalid Login Protection', 'pass', 'Properly rejected invalid credentials');
            } else {
                addResult('Invalid Login Protection', 'fail', `Expected 401, got ${response.status}`);
            }

            // 5. Filter by category
            response = await apiCall('GET', '/products?category=fresh');
            if (response.status === 200 && Array.isArray(response.data)) {
                addResult('Category Filter', 'pass', `Retrieved ${response.data.length || 0} fresh products`);
            } else {
                addResult('Category Filter', 'fail', `Status: ${response.status}`);
            }
        }

        // Check backend on load
        window.addEventListener('load', testBackendConnection);
    </script>
</body>
</html>
